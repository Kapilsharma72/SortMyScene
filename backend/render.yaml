services:
  - type: web
    name: sortmyscene-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
      - key: RESERVATION_HOLD_MINUTES
        value: 10
      - key: CORS_ORIGIN
        sync: false
